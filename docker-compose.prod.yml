services:
  postgres_prod:
    image: postgres:18-alpine3.23
    container_name: khammerson_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${PROD_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PROD_POSTGRES_PASSWORD}
      POSTGRES_DB: ${PROD_POSTGRES_DB}
    ports:
      - "${PROD_POSTGRES_PORT}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - khammerson_prod_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PROD_POSTGRES_USER} -d ${PROD_POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5

  server_prod:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: production
    container_name: khammerson_server_prod
    restart: always
    ports:
      - "${PROD_SERVER_PORT}:4000"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      POSTGRES_PORT: ${PROD_POSTGRES_PORT}
      POSTGRES_USER: ${PROD_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PROD_POSTGRES_PASSWORD}
      POSTGRES_DB: ${PROD_POSTGRES_DB}
    depends_on:
      postgres_prod:
        condition: service_healthy
    networks:
      - khammerson_prod_network

  web_prod:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: khammerson_web_prod
    restart: always
    ports:
      - "${PROD_WEB_PORT}:80"
    depends_on:
      - server_prod
    networks:
      - khammerson_prod_network

volumes:
  postgres_data_prod:

networks:
  khammerson_prod_network:
    driver: bridge