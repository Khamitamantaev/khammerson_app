services:
  postgres:
    image: postgres:18-alpine3.23
    container_name: khammerson_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - khammerson_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: production
    container_name: khammerson_server_prod
    restart: always
    ports:
      - "${SERVER_PORT}:4000"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - khammerson_network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: khammerson_web_prod
    restart: always
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - server
    networks:
      - khammerson_network

volumes:
  postgres_data_prod:

networks:
  khammerson_network:
    driver: bridge