services:
  postgres:
    image: postgres:18-alpine3.23
    container_name: khammerson_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - khammerson_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: khammerson_server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT}:4000"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    develop:
      watch:
        # Синхронизируем исходный код для hot-reload
        - action: sync
          path: ./apps/server/src
          target: /app/apps/server/src
          ignore:
            - node_modules/
            - dist/
            - "*.log"
        - action: sync
          path: ./apps/server/test
          target: /app/apps/server/test
          ignore:
            - node_modules/
        - action: sync
          path: ./apps/server/tsconfig.json
          target: /app/apps/server/tsconfig.json
        - action: sync
          path: ./apps/server/nest-cli.json
          target: /app/apps/server/nest-cli.json
        # Пересобираем при изменении зависимостей
        - action: rebuild
          path: ./apps/server/package.json
        - action: rebuild
          path: ./apps/server/pnpm-lock.yaml
    working_dir: /app/apps/server
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - khammerson_network
    command: nest start --watch

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: khammerson_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT}:3006"
    environment:
      NODE_ENV: development
      VITE_HOST: 0.0.0.0
      VITE_PORT: 3006
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    develop:
      watch:
        # Синхронизируем исходный код для HMR
        - action: sync
          path: ./apps/web/src
          target: /app/apps/web/src
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./apps/web/index.html
          target: /app/apps/web/index.html
        - action: sync
          path: ./apps/web/vite.config.ts
          target: /app/apps/web/vite.config.ts
        - action: sync
          path: ./apps/web/tsconfig.json
          target: /app/apps/web/tsconfig.json
        - action: sync
          path: ./apps/web/tsconfig.node.json
          target: /app/apps/web/tsconfig.node.json
        # Пересобираем при изменении зависимостей
        - action: rebuild
          path: ./apps/web/package.json
        - action: rebuild
          path: ./apps/web/pnpm-lock.yaml
    working_dir: /app/apps/web
    depends_on:
      - server
    networks:
      - khammerson_network
    command: pnpm run dev

volumes:
  postgres_data:
    name: khammerson_postgres_data

networks:
  khammerson_network:
    driver: bridge