services:
  postgres_dev:
    image: postgres:18-alpine3.23
    container_name: khammerson_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DEV_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DEV_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DEV_POSTGRES_DB}
      POSTGRES_PORT: ${DEV_POSTGRES_PORT}
    ports:
      - "${DEV_POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - khammerson_dev_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEV_POSTGRES_USER} -d ${DEV_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server_dev:
    build:
      context: .
      dockerfile: apps/server/Dockerfile.dev
    container_name: khammerson_server_dev
    restart: unless-stopped
    ports:
      - "${DEV_SERVER_PORT}:4000"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      POSTGRES_PORT: ${DEV_POSTGRES_PORT}
      POSTGRES_USER: ${DEV_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DEV_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DEV_POSTGRES_DB}
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    develop:
      watch:
        # Синхронизируем исходный код для hot-reload
        - action: sync
          path: ./apps/server/src
          target: /app/apps/server/src
          ignore:
            - node_modules/
            - dist/
            - "*.log"
        - action: sync
          path: ./apps/server/test
          target: /app/apps/server/test
          ignore:
            - node_modules/
        - action: sync
          path: ./apps/server/tsconfig.json
          target: /app/apps/server/tsconfig.json
        - action: sync
          path: ./apps/server/nest-cli.json
          target: /app/apps/server/nest-cli.json
        # Пересобираем при изменении зависимостей
        - action: rebuild
          path: ./apps/server/package.json
        - action: rebuild
          path: ./apps/server/pnpm-lock.yaml
    working_dir: /app/apps/server
    depends_on:
      postgres_dev:
        condition: service_healthy
    networks:
      - khammerson_dev_network
    command: nest start --watch

  web_dev:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: khammerson_web_dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    ports:
      - "${DEV_WEB_PORT}:3006"
    develop:
      watch:
        # Синхронизируем исходный код для HMR
        - action: sync
          path: ./apps/web/src
          target: /app/apps/web/src
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./apps/web/index.html
          target: /app/apps/web/index.html
        - action: sync
          path: ./apps/web/vite.config.ts
          target: /app/apps/web/vite.config.ts
        - action: sync
          path: ./apps/web/tsconfig.json
          target: /app/apps/web/tsconfig.json
        - action: sync
          path: ./apps/web/tsconfig.node.json
          target: /app/apps/web/tsconfig.node.json
        # Пересобираем при изменении зависимостей
        - action: rebuild
          path: ./apps/web/package.json
        - action: rebuild
          path: ./apps/web/pnpm-lock.yaml
    working_dir: /app/apps/web
    depends_on:
      - server_dev
    networks:
      - khammerson_dev_network
    command: pnpm run dev

volumes:
  postgres_data:
    name: khammerson_postgres_data

networks:
  khammerson_dev_network:
    driver: bridge